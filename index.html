<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>RecipeDiary</title>

        <link
            rel="shortcut icon"
            href="/logos/recipediary.png"
            type="image/x-icon"
        />

        <meta
            name="description"
            content="RecipeDiary is your personal hub for discovering, saving, and sharing delicious recipes. It's your go-to space to explore home-cooked goodness with ease."
        />

        <!-- Open Graph meta tags -->
        <meta property="og:title" content="RecipeDiary" />
        <meta
            property="og:description"
            content="RecipeDiary is your personal hub for discovering, saving, and sharing delicious recipes. It's your go-to space to explore home-cooked goodness with ease."
        />
        <meta property="og:image" content="/images/cover_image.png" />
        <meta property="og:image:alt" content="RecipeDiary" />

        <!-- Twitter Card meta tags -->
        <meta name="twitter:title" content="RecipeDiary" />
        <meta
            name="twitter:description"
            content="RecipeDiary is your personal hub for discovering, saving, and sharing delicious recipes. It's your go-to space to explore home-cooked goodness with ease."
        />
        <meta name="twitter:url" content="/" />
        <meta name="twitter:image:src" content="/images/cover_image.png" />
        <meta name="twitter:image:alt" content="RecipeDiary" />
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
